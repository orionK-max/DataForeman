# nanoMQ Configuration File

# MQTT TCP Listener
mqtt {
    listener {
        bind = "0.0.0.0:1883"
        max_connections = 1024
    }
    allow_anonymous = false
}

# MQTT over TLS Listener (disabled by default)
# mqtt_tls {
#     listener {
#         bind = "0.0.0.0:8883"
#         certfile = "/etc/nanomq/certs/server.crt"
#         keyfile = "/etc/nanomq/certs/server.key"
#         cacertfile = "/etc/nanomq/certs/ca.crt"
#     }
# }

# WebSocket Listener
websocket {
    listener {
        bind = "0.0.0.0:8081/mqtt"
        max_connections = 1024
    }
}

# HTTP API Server
http_server {
    port = 8001
    limit_conn = 32
    username = "admin"
    password = "public"
}

# Async webhook — fires on message publish and client connect.
# Uses its own isolated thread pool (pool_size) — does NOT share threads
# with the HTTP API server, so a slow core cannot block port 8001.
webhook {
    url = "http://core:3000/api/mqtt/webhook"
    headers.content-type = "application/json"
    body.encoding = plain
    pool_size = 4

    events = [
        {
            # Fires on every PUBLISH — gives us from_client_id + topic
            event = "on_message_publish"
        }
        {
            # Fires on successful CONNECT — backup last_seen update
            event = "on_client_connected"
        }
    ]
}

# Authentication via HTTP webhook
auth {
    http_auth {
        auth_req {
            url = "http://core:3000/api/mqtt/auth"
            method = "POST"
            headers {
                content-type = "application/json"
                connection = "close"
            }
            params = {username = "%u", password = "%P", clientid = "%c"}
        }
        # ACL hook removed — it fired on every PUBLISH/SUBSCRIBE which caused
        # NanoMQ's HTTP worker threads to saturate when core was temporarily
        # unavailable (e.g. during rebuild). Topic tracking is now handled via
        # the auth_req (on CONNECT) and MQTT subscription in the core service.
        timeout = 2s
    }
}

# Logging
log {
    level = "info"
    file = "/var/log/nanomq/nanomq.log"
}
